name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      # Suite is pinned to the offline local backend via vite.config.js test.env,
      # so no secrets or external services are needed here.
      - run: npm test -- --run
      - run: npm run build
