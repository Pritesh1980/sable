<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Audit</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #e0d8cc; font-family: system-ui, sans-serif; padding-bottom: 100px; }

  header { position: sticky; top: 0; z-index: 10; background: #111; border-bottom: 1px solid #2a2a2a;
           padding: 10px 16px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #888; }
  #artist-nav { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  #artist-nav a { font-size: 11px; color: #555; text-decoration: none; padding: 2px 6px; border-radius: 3px;
                  border: 1px solid #2a2a2a; transition: all 0.15s; }
  #artist-nav a:hover { color: #ccc; border-color: #555; }
  #artist-nav a.done { color: #3a7a3a; border-color: #2a4a2a; }

  .artist { padding: 24px 16px 8px; }
  .artist h2 { font-size: 13px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
               color: #666; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
  .artist h2 span.count { font-size: 11px; color: #444; font-weight: 400; }
  .artist h2 span.marked-label { font-size: 11px; color: #c0392b; font-weight: 400; display: none; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 4px; }

  .thumb { position: relative; aspect-ratio: 1; cursor: pointer; overflow: hidden; border-radius: 3px; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.15s; }
  .thumb .num { position: absolute; top: 4px; left: 4px; font-size: 10px; color: rgba(255,255,255,0.5);
                background: rgba(0,0,0,0.5); padding: 1px 4px; border-radius: 2px; pointer-events: none; }
  .thumb .x { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
              background: rgba(180,30,30,0.7); opacity: 0; transition: opacity 0.15s; font-size: 32px;
              color: #fff; font-weight: 700; pointer-events: none; }
  .thumb.marked img { opacity: 0.3; }
  .thumb.marked .x { opacity: 1; }
  .thumb:hover img { opacity: 0.85; }
  .thumb.marked:hover img { opacity: 0.4; }

  #bar { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 1px solid #2a2a2a;
         padding: 12px 16px; display: flex; align-items: center; gap: 12px; z-index: 20; }
  #bar .tally { font-size: 13px; color: #888; }
  #bar .tally strong { color: #c0392b; }
  #copy-btn { margin-left: auto; background: #1a3a1a; color: #5a9a5a; border: 1px solid #2a5a2a;
              padding: 7px 16px; border-radius: 4px; font-size: 12px; cursor: pointer; letter-spacing: 0.05em; }
  #copy-btn:hover { background: #234a23; }
  #apply-btn { background: #3a1a1a; color: #c0392b; border: 1px solid #5a2a2a;
               padding: 7px 16px; border-radius: 4px; font-size: 12px; cursor: pointer; letter-spacing: 0.05em; }
  #apply-btn:hover { background: #4a2323; }
  #toast { position: fixed; bottom: 70px; right: 16px; background: #1a3a1a; color: #5aba5a;
           padding: 8px 14px; border-radius: 4px; font-size: 12px; opacity: 0; transition: opacity 0.3s;
           pointer-events: none; z-index: 30; }
  #toast.show { opacity: 1; }

  #output { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 40;
            align-items: center; justify-content: center; }
  #output.show { display: flex; }
  #output pre { background: #111; border: 1px solid #333; border-radius: 6px; padding: 20px;
                max-width: 700px; max-height: 80vh; overflow: auto; font-size: 12px; color: #aaa;
                white-space: pre-wrap; }
  #output-close { position: absolute; top: 20px; right: 20px; background: none; border: none;
                  color: #666; font-size: 24px; cursor: pointer; }
</style>
</head>
<body>

<header>
  <h1>Audit</h1>
  <div id="artist-nav"></div>
</header>

<div id="artists"></div>

<div id="bar">
  <div class="tally">Marked for removal: <strong id="total">0</strong></div>
  <button id="copy-btn">Copy JSON</button>
  <button id="apply-btn">Apply removals</button>
</div>

<div id="toast">Copied to clipboard</div>

<div id="output">
  <pre id="output-pre"></pre>
  <button id="output-close">✕</button>
</div>

const marked = new Set();

function getMarked() {
  return [...marked].sort();
}

function updateTally() {
  document.getElementById('total').textContent = marked.size;
}

function updateArtistLabel(artistId) {
  const section = document.getElementById('artist-' + artistId);
  if (!section) return;
  const artist = ARTISTS.find(a => a.id === artistId);
  const artistMarked = [...marked].filter(p => p.includes('/artists/' + artistId + '/'));
  const label = section.querySelector('.marked-label');
  label.textContent = artistMarked.length ? `— ${artistMarked.length} marked` : '';
  label.style.display = artistMarked.length ? 'inline' : 'none';
  const navLink = document.querySelector(`#artist-nav a[href="#artist-${artistId}"]`);
  if (navLink) navLink.classList.toggle('done', artistMarked.length > 0);
}

function build() {
  const nav = document.getElementById('artist-nav');
  const container = document.getElementById('artists');

  ARTISTS.forEach(artist => {
    const a = document.createElement('a');
    a.href = '#artist-' + artist.id;
    a.textContent = artist.id;
    nav.appendChild(a);

    const section = document.createElement('div');
    section.className = 'artist';
    section.id = 'artist-' + artist.id;

    const h2 = document.createElement('h2');
    h2.innerHTML = `${artist.id} <span class="count">${artist.images.length} images</span><span class="marked-label"></span>`;
    section.appendChild(h2);

    const grid = document.createElement('div');
    grid.className = 'grid';

    artist.images.forEach((src, i) => {
      const thumb = document.createElement('div');
      thumb.className = 'thumb';
      thumb.dataset.path = src;

      const img = document.createElement('img');
      img.src = src;
      img.loading = 'lazy';

      const num = document.createElement('div');
      num.className = 'num';
      num.textContent = i + 1;

      const x = document.createElement('div');
      x.className = 'x';
      x.textContent = '✕';

      thumb.appendChild(img);
      thumb.appendChild(num);
      thumb.appendChild(x);

      thumb.addEventListener('click', () => {
        if (marked.has(src)) {
          marked.delete(src);
          thumb.classList.remove('marked');
        } else {
          marked.add(src);
          thumb.classList.add('marked');
        }
        updateTally();
        updateArtistLabel(artist.id);
      });

      grid.appendChild(thumb);
    });

    section.appendChild(grid);
    container.appendChild(section);
  });
}

document.getElementById('copy-btn').addEventListener('click', () => {
  const json = JSON.stringify(getMarked(), null, 2);
  navigator.clipboard.writeText(json).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
});

document.getElementById('apply-btn').addEventListener('click', async () => {
  const paths = getMarked();
  if (!paths.length) { alert('Nothing marked.'); return; }
  if (!confirm(`Delete ${paths.length} image(s) and renumber? This cannot be undone.`)) return;

  document.getElementById('apply-btn').textContent = 'Applying…';
  document.getElementById('apply-btn').disabled = true;

  try {
    const res = await fetch('http://localhost:5175/apply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(paths),
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    const summary = data.results.map(r =>
      `${r.artistId}: removed ${r.deleted}, ${r.remaining} remaining`
    ).join('\n');
    alert(`Done!\n\n${summary}`);
    paths.forEach(p => {
      marked.delete(p);
      const thumb = document.querySelector(`.thumb[data-path="${p}"]`);
      if (thumb) thumb.remove();
    });
    updateTally();
  } catch (e) {
    alert(`Error: ${e.message}\n\nIs audit-server running?\n! node scripts/audit-server.js`);
  } finally {
    document.getElementById('apply-btn').textContent = 'Apply removals';
    document.getElementById('apply-btn').disabled = false;
  }
});

document.getElementById('output-close').addEventListener('click', () => {
  document.getElementById('output').classList.remove('show');
});

build();
</script>
