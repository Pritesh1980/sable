<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#141210" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sable" />
    <meta name="description" content="Artist discovery and tattoo planning" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&family=Marcellus:wght@400;500;600&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>Sable</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Apply saved preferences before first paint to avoid flash -->
    <script>
      const t = localStorage.getItem('tattoo_theme')
      if (t === 'light') document.documentElement.setAttribute('data-theme', 'light')
      const f = localStorage.getItem('tattoo_font')
      if (f === 'large') document.documentElement.setAttribute('data-font', 'large')
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
